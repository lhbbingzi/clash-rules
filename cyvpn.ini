[custom]
;不要随意改变关键字，否则会导致出错
;ACL4SSR + blackmatrix7 混合增强版


;====================================================
; 1) 自定义直连（优先级最高）
;====================================================
ruleset=DIRECT,https://raw.githubusercontent.com/lhbbingzi/clash-rules/main/DirectCN.list

;====================================================
; 2) 局域网 / 必须直连
;====================================================
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list

;====================================================
; 3) blackmatrix7 国内增强
;====================================================
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax.list

;====================================================
; 4) 下载 / 系统服务
;====================================================
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list

;====================================================
; 5) 自定义强制代理
;====================================================
ruleset=🧭 常用节点,https://raw.githubusercontent.com/lhbbingzi/clash-rules/main/Proxy.list

;====================================================
; 6) 业务专用分流
;====================================================
ruleset=📺 Tiktok固定节点,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/TikTok.list

ruleset=📘 Facebook固定节点,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Facebook.list

;====================================================
; 7) 通用代理规则（放后面）
;====================================================
ruleset=🧭 常用节点,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list

ruleset=🧭 常用节点,https://raw.githubusercontent.com/cmliu/ACL4SSR/main/Clash/CMBlog.list

;====================================================
; 8) 最终兜底
;====================================================
ruleset=🏠 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

;====================================================
; 主代理组
;====================================================
custom_proxy_group=🧭 常用节点`select`.*

;====================================================
; 业务分流组
; 默认继承“🧭 常用节点”
; 同时允许手动切换任意节点
;====================================================
custom_proxy_group=📺 Tiktok固定节点`select`[]🧭 常用节点`.*

custom_proxy_group=📘 Facebook固定节点`select`[]🧭 常用节点`.*

;====================================================
; 直连组
;====================================================
custom_proxy_group=🏠 全球直连`select`[]DIRECT`[]🧭 常用节点

;====================================================
; 最终兜底
;====================================================
custom_proxy_group=🐟 漏网之鱼`select`[]🧭 常用节点`[]🏠 全球直连

enable_rule_generator=true
overwrite_original_rules=true
