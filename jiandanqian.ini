[custom]
;不要随意改变关键字，否则会导致出错
;ACL4SSR + blackmatrix7 混合增强版


;====================================================
; 1) 自定义直连（优先级最高）
;====================================================
ruleset=DIRECT,https://raw.githubusercontent.com/lhbbingzi/clash-rules/main/DirectCN.list
;====================================================
; 2) 局域网 / 必须直连
;====================================================
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
;====================================================
; 3) blackmatrix7 国内增强
;====================================================
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax.list
;====================================================
; 4) 下载 / 系统服务
;====================================================
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
;====================================================
; 5) 自定义强制代理
;====================================================
ruleset=🧭 节点选择,https://raw.githubusercontent.com/lhbbingzi/clash-rules/main/Proxy.list
;====================================================
; 6) 业务专用分流
;====================================================
ruleset=📺 Tiktok节点,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/TikTok.list
ruleset=📘 Facebook节点,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Facebook.list
ruleset=💚 WhatsApp节点,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Whatsapp.list
ruleset=🤖 AI节点,https://raw.githubusercontent.com/lhbbingzi/clash-rules/main/AI.list

;====================================================
; 7) 自定义其他规则
;====================================================
ruleset=🧩 其他01,https://raw.githubusercontent.com/lhbbingzi/clash-rules/main/qita01.list
ruleset=🗃️ 其他02,https://raw.githubusercontent.com/lhbbingzi/clash-rules/main/qita02.list

;====================================================
; 8) 通用代理规则（放后面）
;====================================================
ruleset=🧭 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
ruleset=🧭 节点选择,https://raw.githubusercontent.com/cmliu/ACL4SSR/main/Clash/CMBlog.list

;====================================================
; 9) 最终兜底
;====================================================
ruleset=🏠 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

;====================================================
; 主代理组
;====================================================
custom_proxy_group=🧭 节点选择`select`.*
;====================================================
; 业务分流组
; 默认继承“🧭 节点选择”
; 同时允许手动切换任意节点
;====================================================
custom_proxy_group=📺 Tiktok节点`select`[]🧭 节点选择`.*
custom_proxy_group=📘 Facebook节点`select`[]🧭 节点选择`.*
custom_proxy_group=💚 WhatsApp节点`select`[]🧭 节点选择`.*
custom_proxy_group=🤖 AI节点`select`[]🧭 节点选择`.*

;====================================================
; 自定义分流组
;====================================================
custom_proxy_group=🧩 其他01`select`[]🧭 节点选择`.*
custom_proxy_group=🗃️ 其他02`select`[]🧭 节点选择`.*

;====================================================
; 直连组
;====================================================
custom_proxy_group=🏠 全球直连`select`[]DIRECT`[]🧭 节点选择

;====================================================
; 最终兜底
;====================================================
custom_proxy_group=🐟 漏网之鱼`select`[]🧭 节点选择`[]🏠 全球直连

enable_rule_generator=true
overwrite_original_rules=true
