;========================
; 3) 你的自定义其他规则
;========================
ruleset=🛑 其他01,https://raw.githubusercontent.com/lhbbingzi/clash-rules/main/qita01.list
ruleset=🎯 其他02,https://raw.githubusercontent.com/lhbbingzi/clash-rules/main/qita02.list

;========================
; 4) 通用代理规则（放后面）
;========================
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/cmliu/ACL4SSR/main/Clash/CMBlog.list

;========================
; 5) 最终兜底
;========================
ruleset=🌍 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

;========================
; 策略组显示顺序
; 节点选择 -> TikTok -> Facebook -> OpenAI -> 其他组
;========================
custom_proxy_group=🚀 节点选择`select`.*

custom_proxy_group=📺 Tiktok节点`select`[]🚀 节点选择`.*
custom_proxy_group=🌐 Facebook节点`select`[]🚀 节点选择`.*
custom_proxy_group=🟢 WhatsApp节点`select`[]🚀 节点选择`.*
custom_proxy_group=🤖 OpenAi节点`select`[]🚀 节点选择`.*

custom_proxy_group=🛑 其他01`select`[]🚀 节点选择`.*
custom_proxy_group=🎯 其他02`select`[]🚀 节点选择`.*

custom_proxy_group=🌍 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🌍 全球直连`.*

enable_rule_generator=true
overwrite_original_rules=true
